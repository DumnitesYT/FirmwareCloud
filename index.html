<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirmwareCloud — ROM Cloud for oplus!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050811;
            --card-bg: #0b111e;
            --accent-color: #eb0029;
            --text-main: #ffffff;
            --text-muted: #6b7280;
            --border-color: #111827;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: var(--bg-color);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            background-color: var(--accent-color);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .logo-text span {
            color: var(--accent-color);
        }

        .auth-buttons button {
            background-color: #0c101b;
            color: var(--text-main);
            border: 1px solid #1f2937;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-badge {
            background-color: #0c101b;
            border: 1px solid #1f2937;
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
        }

        .user-avatar {
            background-color: var(--accent-color);
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .logout-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            color: var(--text-main);
        }

        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            text-align: center;
            padding: 0 20px;
        }

        .badge-status {
            background-color: rgba(235, 0, 41, 0.1);
            color: var(--accent-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .main-title {
            font-size: 56px;
            font-weight: bold;
            margin: 0 0 10px 0;
        }

        .main-title .brand-red {
            color: var(--accent-color);
        }

        .subtitle {
            color: #4b5563;
            margin-bottom: 40px;
            font-size: 14px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }

        .search-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto 50px;
        }

        .search-container i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #374151;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 50px;
            background-color: #070c16;
            border: 1px solid #111827;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        .devices-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(280px, 1fr));
            gap: 16px;
            max-width: 1000px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .devices-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        .device-card {
            background-color: #060a13;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-align: left;
            cursor: pointer;
        }

        .device-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .device-icon-box {
            background-color: #090e1a;
            border: 1px solid #111827;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .device-name {
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .device-count {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .device-count span {
            color: var(--accent-color);
        }

        .arrow-icon {
            background-color: #090e1a;
            border: 1px solid #111827;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 12px;
        }

        /* МОДАЛКА */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #070c16;
            border: 1px solid #111827;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            box-sizing: border-box;
            position: relative;
        }

        .close-modal {
            position: absolute;
            right: 20px;
            top: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #0c1220;
            border: 1px solid #161f30;
            border-radius: 8px;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
        }

        .error-message {
            color: var(--accent-color);
            font-size: 14px;
            margin-bottom: 15px;
            text-align: left;
            display: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #111827;
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #161f30;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .switch-auth-mode {
            margin-top: 15px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .switch-auth-mode a {
            color: var(--text-main);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon"><i class="fa-solid fa-cube"></i></div>
            <div class="logo-text">FW<span>CLOUD</span></div>
        </div>
        <div class="auth-buttons" id="authHeaderArea">
            <button id="openAuthBtn">Войти</button>
        </div>
    </header>

    <div class="main-container">
        <div class="badge-status">● СТЕНД МОДИФИЦИРОВАН</div>
        <h1 class="main-title">Выберите устройство <span class="brand-red">OnePlus</span></h1>
        <p class="subtitle">Интерактивный доступ к архивам OxygenOS. Выберите модель ниже для просмотра доступных пакетов прошивок.</p>
        
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск смартфона (например, OnePlus 12)...">
        </div>

        <div class="devices-grid" id="devicesGrid"></div>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModalBtn">&times;</button>
            <h2 id="modalTitle" style="margin-top: 0; margin-bottom: 24px; text-align: left; font-size: 20px;">Войти</h2>
            
            <form id="authForm">
                <div class="form-group">
                    <label>EMAIL (ДЛЯ ВХОДА)</label>
                    <input type="email" id="email" placeholder="user@domain.com" required>
                </div>
                <div class="form-group">
                    <label>ПАРОЛЬ</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div class="error-message" id="authError">Ошибка</div>

                <button type="submit" class="submit-btn" id="submitFormBtn">ВОЙТИ</button>
            </form>

            <div class="divider">или</div>

            <button class="google-btn" id="googleLoginBtn">
                <i class="fa-brands fa-google"></i> Продолжить с Google
            </button>

            <div class="switch-auth-mode" id="switchAuthBlock">
                Нет аккаунта? <a href="#" id="toggleAuthModeLink">Создать аккаунт</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "ВСТАВЬ_СЮДА_СВОЙ_API_KEY_ИЗ_НАСТРОЕК", 
            authDomain: "fwcloud-70490.firebaseapp.com",
            projectId: "fwcloud-70490",
            storageBucket: "fwcloud-70490.appspot.com",
            messagingSenderId: "562358328378",
            appId: "1:562358328378:web:757451631be8bf49911e3b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        // ВСЕ УСТРОЙСТВА СРАЗУ В ИНДЕКСЕ
        const devicesData = [
            { "name": "OnePlus 12", "count": "3 СБОРКИ" },
            { "name": "OnePlus 11", "count": "2 СБОРКИ" },
            { "name": "OnePlus Nord 4", "count": "2 СБОРКИ" },
            { "name": "OnePlus Open", "count": "1 СБОРКА" }
        ];

        let isSignUpMode = false;

        const authModal = document.getElementById('authModal');
        const openAuthBtn = document.getElementById('openAuthBtn');
        const authHeaderArea = document.getElementById('authHeaderArea');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const authForm = document.getElementById('authForm');
        const modalTitle = document.getElementById('modalTitle');
        const submitFormBtn = document.getElementById('submitFormBtn');
        const toggleAuthModeLink = document.getElementById('toggleAuthModeLink');
        const switchAuthBlock = document.getElementById('switchAuthBlock');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const authError = document.getElementById('authError');
        const devicesGrid = document.getElementById('devicesGrid');
        const searchInput = document.getElementById('searchInput');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const name = user.displayName || user.email.split('@')[0];
                const firstLetter = name.charAt(0).toUpperCase();
                authHeaderArea.innerHTML = `
                    <div class="user-badge">
                        <span class="user-name">${name}</span>
                        <div class="user-avatar">${firstLetter}</div>
                        <button class="logout-btn" id="logoutBtn"><i class="fa-solid fa-door-open"></i></button>
                    </div>
                `;
                document.getElementById('logoutBtn').onclick = () => {
                    signOut(auth).then(() => { window.location.reload(); });
                };
            } else {
                authHeaderArea.innerHTML = `<button id="openAuthBtn">Войти</button>`;
                document.getElementById('openAuthBtn').onclick = openModal;
            }
        });

        function openModal() { authModal.style.display = 'flex'; hideError(); }
        function closeModal() { authModal.style.display = 'none'; authForm.reset(); }
        closeModalBtn.onclick = closeModal;
        window.onclick = (e) => { if (e.target === authModal) closeModal(); };

        toggleAuthModeLink.onclick = (e) => {
            e.preventDefault();
            isSignUpMode = !isSignUpMode;
            hideError();
            if (isSignUpMode) {
                modalTitle.innerText = "Регистрация";
                submitFormBtn.innerText = "СОЗДАТЬ АККАУНТ";
                switchAuthBlock.innerHTML = 'Уже есть аккаунт? <a href="#" id="toggleAuthModeLink">Войти</a>';
            } else {
                modalTitle.innerText = "Войти";
                submitFormBtn.innerText = "ВОЙТИ";
                switchAuthBlock.innerHTML = 'Нет аккаунта? <a href="#" id="toggleAuthModeLink">Создать аккаунт</a>';
            }
            document.getElementById('toggleAuthModeLink').onclick = toggleAuthModeLink.onclick;
        };

        function showError(msg) { authError.innerText = msg; authError.style.display = 'block'; }
        function hideError() { authError.style.display = 'none'; }

        authForm.onsubmit = async (e) => {
            e.preventDefault();
            hideError();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                if (isSignUpMode) {
                    await createUserWithEmailAndPassword(auth, email, password);
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
                closeModal();
            } catch (error) {
                showError("Ошибка аутентификации.");
            }
        };

        googleLoginBtn.onclick = async (e) => {
            e.preventDefault();
            hideError();
            try {
                await signInWithPopup(auth, provider);
                closeModal();
            } catch (error) {
                showError("Ошибка сети Google.");
            }
        };

        function renderDevices(list) {
            if (list.length === 0) {
                devicesGrid.innerHTML = `<p style="color: var(--text-muted)">Ничего не найдено</p>`;
                return;
            }
            devicesGrid.innerHTML = list.map(device => `
                <div class="device-card" onclick="alert('Выбрано устройство: ${device.name}')">
                    <div class="device-info">
                        <div class="device-icon-box">
                            <i class="fa-solid fa-mobile-screen-button"></i>
                        </div>
                        <div>
                            <div class="device-name">${device.name}</div>
                            <div class="device-count"><span>●</span> ${device.count}</div>
                        </div>
                    </div>
                    <div class="arrow-icon">
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                </div>
            `).join('');
        }

        searchInput.oninput = (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = devicesData.filter(d => d.name.toLowerCase().includes(query));
            renderDevices(filtered);
        };

        renderDevices(devicesData);
    </script>
</body>
</html>
